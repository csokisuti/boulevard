<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boulevard - Belépés</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h1>Boulevard</h1>
    <p>Standoló és készletnyilvántartó rendszer</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="email cím">

    <label for="password">Jelszó</label>
    <input type="password" id="password" placeholder="jelszó">

    <button id="loginBtn">Belépés</button>

    <div id="message"></div>
  </div>

  <script type="module">
    import { auth } from "./firebase.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const message = document.getElementById("message");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });

    loginBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      message.textContent = "";

      if (!email || !password) {
        message.textContent = "Add meg az email címet és a jelszót.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } catch (error) {
        message.textContent = "Sikertelen belépés. Ellenőrizd az adatokat.";
      }
    });
  </script>
</body>
</html>
