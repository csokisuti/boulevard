<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boulevard - Főoldal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Boulevard</h1>
      <p id="userInfo">Betöltés...</p>
    </div>
    <button id="logoutBtn" class="secondary-btn">Kilépés</button>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Főmenü</h2>
      <div id="menu" class="menu-grid"></div>
    </section>

    <section class="panel">
      <div class="section-header">
        <div>
          <h2>Lezárt standok</h2>
          <p id="closedShiftsMessage">Betöltés...</p>
        </div>
        <button id="refreshClosedShiftsBtn" class="secondary-dark-btn">Frissítés</button>
      </div>

      <div class="table-wrapper">
        <table class="data-table dashboard-closed-table">
          <thead>
            <tr>
              <th>Dátum</th>
              <th>Stand</th>
              <th>Lezárta</th>
              <th>Eladási érték</th>
              <th>Várható pénztár</th>
              <th>Utólag módosítva</th>
              <th>Művelet</th>
            </tr>
          </thead>
          <tbody id="closedShiftsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { collection, doc, getDoc, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { hasPermission, roleLabel } from "./permissions.js";

    const userInfo = document.getElementById("userInfo");
    const menu = document.getElementById("menu");
    const logoutBtn = document.getElementById("logoutBtn");
    const closedShiftsBody = document.getElementById("closedShiftsBody");
    const closedShiftsMessage = document.getElementById("closedShiftsMessage");
    const refreshClosedShiftsBtn = document.getElementById("refreshClosedShiftsBtn");

    let currentUser = null;
    let currentUserData = null;
    let openShift = null;

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });

    refreshClosedShiftsBtn.addEventListener("click", async () => {
      await loadClosedShifts();
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function addMenuItem(title, text, href, options = {}) {
      const a = document.createElement("a");
      a.className = `menu-card ${options.className || ""}`.trim();
      a.href = href;
      a.innerHTML = `
        <strong>${escapeHtml(title)}</strong>
        <span>${escapeHtml(text)}</span>
        ${options.badge ? `<em class="menu-card-badge">${escapeHtml(options.badge)}</em>` : ""}
      `;
      menu.appendChild(a);
    }

    function formatMoney(value) {
      return `${Math.round(Number(value || 0)).toLocaleString("hu-HU")} Ft`;
    }

    function formatDateTime(value) {
      if (!value) return "-";
      const date = value.toDate ? value.toDate() : new Date(value);
      return date.toLocaleString("hu-HU");
    }

    function formatBusinessDate(value) {
      if (!value) return "-";
      const parts = String(value).split("-");
      if (parts.length !== 3) return value;
      return `${parts[0]}.${parts[1]}.${parts[2]}.`;
    }

    function shiftStartDateValue(shift) {
      return shift?.businessDateStart || shift?.businessDate || "";
    }

    function shiftEndDateValue(shift) {
      return shift?.businessDateEnd || shiftStartDateValue(shift);
    }

    function formatBusinessDateRange(start, end) {
      if (!start && !end) return "-";
      const safeStart = start || end;
      const safeEnd = end || start;
      if (!safeEnd || safeStart === safeEnd) return formatBusinessDate(safeStart);
      return `${formatBusinessDate(safeStart)} - ${formatBusinessDate(safeEnd)}`;
    }

    function shiftDateLabel(shift) {
      return shift?.businessDateLabel || formatBusinessDateRange(shiftStartDateValue(shift), shiftEndDateValue(shift));
    }

    async function loadOpenShift() {
      openShift = null;
      const q = query(collection(db, "shifts"), where("status", "==", "open"), limit(1));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const item = snap.docs[0];
        openShift = { id: item.id, ...item.data() };
      }
    }

    async function loadClosedShifts() {
      if (!hasPermission(currentUserData, "canViewClosedShifts")) {
        closedShiftsMessage.textContent = "Nincs jogosultság a lezárt standok listájához.";
        closedShiftsBody.innerHTML = `<tr><td colspan="7">Nincs jogosultság.</td></tr>`;
        return;
      }

      closedShiftsMessage.textContent = "Betöltés...";
      closedShiftsBody.innerHTML = `<tr><td colspan="7">Betöltés...</td></tr>`;

      try {
        const shiftsQuery = query(collection(db, "shifts"), orderBy("closedAt", "desc"), limit(40));
        const snap = await getDocs(shiftsQuery);
        const shifts = [];

        snap.forEach(item => {
          const data = item.data();
          if (data.status === "closed") shifts.push({ id: item.id, ...data });
        });

        closedShiftsBody.innerHTML = "";

        if (!shifts.length) {
          closedShiftsMessage.textContent = "Még nincs lezárt stand.";
          closedShiftsBody.innerHTML = `<tr><td colspan="7">Nincs lezárt stand.</td></tr>`;
          return;
        }

        closedShiftsMessage.textContent = `Utolsó ${shifts.length} lezárt stand`;

        shifts.forEach((shift, index) => {
          const tr = document.createElement("tr");
          const dateText = shiftDateLabel(shift) || formatDateTime(shift.closedAt);
          const standOwner = shift.assignedUserName || shift.closedByName || shift.openedByName || "-";
          const modifiedText = shift.modifiedAfterClose ? `Igen, ${shift.lastModifiedAfterCloseByName || "-"}` : "Nem";
          const isLatestClosed = index === 0;
          const canEditClosed = !openShift && isLatestClosed && (currentUserData.role === "admin" || shift.assignedUserId === currentUser?.uid);
          const editButton = canEditClosed
            ? `<a class="small-link-btn" href="stand.html?shiftId=${encodeURIComponent(shift.id)}&mode=edit">Szerkesztés</a>`
            : "";

          tr.innerHTML = `
            <td>${escapeHtml(dateText)}</td>
            <td>${escapeHtml(standOwner)}</td>
            <td>${escapeHtml(shift.closedByName || "-")}</td>
            <td>${formatMoney(shift.totalSalesValue)}</td>
            <td>${formatMoney(shift.totalCashExpected || shift.totalSalesValue)}</td>
            <td>${escapeHtml(modifiedText)}</td>
            <td class="dashboard-action-cell">
              <a class="small-link-btn secondary-inline-btn" href="stand.html?shiftId=${encodeURIComponent(shift.id)}&mode=view">Megnyitás</a>
              ${editButton}
              <a class="small-link-btn print-link-btn" href="shift_print.html?shiftId=${encodeURIComponent(shift.id)}" target="_blank">PDF kép</a>
            </td>
          `;
          closedShiftsBody.appendChild(tr);
        });
      } catch (error) {
        console.error(error);
        closedShiftsMessage.textContent = "Nem sikerült betölteni a lezárt standokat.";
        closedShiftsBody.innerHTML = `<tr><td colspan="7">Hiba történt betöltés közben.</td></tr>`;
      }
    }

    function renderMenu(userData) {
      menu.innerHTML = "";

      if (hasPermission(userData, "canViewStand")) {
        if (openShift) {
          addMenuItem(
            "Standolás",
            `${shiftDateLabel(openShift)} | ${openShift.assignedUserName || "nyitott stand"}`,
            "stand.html",
            { className: "menu-card-open-shift", badge: "NYITOTT STAND" }
          );
        } else {
          addMenuItem("Standolás", "Nincs nyitott stand, új stand nyitható", "stand.html");
        }
      }

      if (hasPermission(userData, "canViewDebts")) {
        addMenuItem("Tartozások", "Nyitott tartozások, befizetések", "debts.html");
      }

      if (hasPermission(userData, "canViewProducts")) {
        addMenuItem("Terméklista", "Termékek, árak és készlet", "products.html");
      }

      if (hasPermission(userData, "canViewLogs")) {
        addMenuItem("Admin ellenőrzések", "Módosítások, eltérések, naplók", "admin_review.html");
      }

      if (hasPermission(userData, "canViewReports")) {
        addMenuItem("Riportok", "Árrés, fogyás, dolgozói teljesítmény", "reports.html");
        addMenuItem("Nyitó eltérések", "Hiányok, többletek, stand pontosság", "opening_adjustments.html");
      }

      if (hasPermission(userData, "canManageUsers")) {
        addMenuItem("Felhasználók", "Jogosultságok kezelése", "users.html");
      }

      if (!menu.children.length) {
        menu.innerHTML = `<p>Nincs beállított jogosultságod egyik modulhoz sem.</p>`;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        userInfo.textContent = "Nincs jogosultság beállítva ehhez a felhasználóhoz.";
        menu.innerHTML = "";
        return;
      }

      currentUser = user;
      currentUserData = userSnap.data();

      if (!currentUserData.active) {
        userInfo.textContent = "Ez a felhasználó inaktív.";
        menu.innerHTML = "";
        return;
      }

      userInfo.textContent = `${currentUserData.name} - ${roleLabel(currentUserData.role)}`;

      await loadOpenShift();
      renderMenu(currentUserData);
      await loadClosedShifts();
    });
  </script>
</body>
</html>
