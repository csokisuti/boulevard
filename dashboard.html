<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boulevard - Főoldal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Boulevard</h1>
      <p id="userInfo">Betöltés...</p>
    </div>
    <button id="logoutBtn" class="secondary-btn">Kilépés</button>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Főmenü</h2>
      <div id="menu" class="menu-grid"></div>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const userInfo = document.getElementById("userInfo");
    const menu = document.getElementById("menu");
    const logoutBtn = document.getElementById("logoutBtn");

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });

    function addMenuItem(title, text, href) {
      const a = document.createElement("a");
      a.className = "menu-card";
      a.href = href;
      a.innerHTML = `<strong>${title}</strong><span>${text}</span>`;
      menu.appendChild(a);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        userInfo.textContent = "Nincs jogosultság beállítva ehhez a felhasználóhoz.";
        menu.innerHTML = "";
        return;
      }

      const userData = userSnap.data();

      if (!userData.active) {
        userInfo.textContent = "Ez a felhasználó inaktív.";
        menu.innerHTML = "";
        return;
      }

      userInfo.textContent = `${userData.name} - ${userData.role === "admin" ? "Admin" : "Dolgozó"}`;

      addMenuItem("Standolás", "Aktuális műszak kezelése", "stand.html");
      addMenuItem("Terméklista", "Termékek és árak kezelése", "products.html");

      if (userData.role === "admin") {
        addMenuItem("Admin ellenőrzések", "Módosítások, eltérések, naplók", "admin.html");
        addMenuItem("Riportok", "Árrés, fogyás, dolgozói teljesítmény", "reports.html");
        addMenuItem("Felhasználók", "Jogosultságok kezelése", "users.html");
      }
    });
  </script>
</body>
</html>
