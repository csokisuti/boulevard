<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boulevard - Főoldal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Boulevard</h1>
      <p id="userInfo">Betöltés...</p>
    </div>
    <button id="logoutBtn" class="secondary-btn">Kilépés</button>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Főmenü</h2>
      <div id="menu" class="menu-grid"></div>
    </section>

    <section class="panel">
      <div class="section-header">
        <div>
          <h2>Lezárt standok</h2>
          <p id="closedShiftsMessage">Betöltés...</p>
        </div>
        <button id="refreshClosedShiftsBtn" class="secondary-dark-btn">Frissítés</button>
      </div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Dátum</th>
              <th>Stand</th>
              <th>Lezárta</th>
              <th>Eladási érték</th>
              <th>Várható pénztár</th>
              <th>Utólag módosítva</th>
              <th>Művelet</th>
            </tr>
          </thead>
          <tbody id="closedShiftsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { collection, doc, getDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const userInfo = document.getElementById("userInfo");
    const menu = document.getElementById("menu");
    const logoutBtn = document.getElementById("logoutBtn");
    const closedShiftsBody = document.getElementById("closedShiftsBody");
    const closedShiftsMessage = document.getElementById("closedShiftsMessage");
    const refreshClosedShiftsBtn = document.getElementById("refreshClosedShiftsBtn");

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });

    refreshClosedShiftsBtn.addEventListener("click", async () => {
      await loadClosedShifts();
    });

    function addMenuItem(title, text, href) {
      const a = document.createElement("a");
      a.className = "menu-card";
      a.href = href;
      a.innerHTML = `<strong>${title}</strong><span>${text}</span>`;
      menu.appendChild(a);
    }

    function formatMoney(value) {
      return `${Math.round(Number(value || 0)).toLocaleString("hu-HU")} Ft`;
    }

    function formatDateTime(value) {
      if (!value) return "-";
      const date = value.toDate ? value.toDate() : new Date(value);
      return date.toLocaleString("hu-HU");
    }

    function formatBusinessDate(value) {
      if (!value) return "-";
      const parts = String(value).split("-");
      if (parts.length !== 3) return value;
      return `${parts[0]}.${parts[1]}.${parts[2]}.`;
    }

    async function loadClosedShifts() {
      closedShiftsMessage.textContent = "Betöltés...";
      closedShiftsBody.innerHTML = `<tr><td colspan="7">Betöltés...</td></tr>`;

      try {
        const shiftsQuery = query(collection(db, "shifts"), orderBy("closedAt", "desc"), limit(40));
        const snap = await getDocs(shiftsQuery);
        const shifts = [];

        snap.forEach(item => {
          const data = item.data();

          if (data.status === "closed") {
            shifts.push({
              id: item.id,
              ...data
            });
          }
        });

        closedShiftsBody.innerHTML = "";

        if (!shifts.length) {
          closedShiftsMessage.textContent = "Még nincs lezárt stand.";
          closedShiftsBody.innerHTML = `<tr><td colspan="7">Nincs lezárt stand.</td></tr>`;
          return;
        }

        closedShiftsMessage.textContent = `Utolsó ${shifts.length} lezárt stand`;

        shifts.forEach(shift => {
          const tr = document.createElement("tr");
          const dateText = shift.businessDate ? formatBusinessDate(shift.businessDate) : formatDateTime(shift.closedAt);
          const standOwner = shift.assignedUserName || shift.closedByName || shift.openedByName || "-";
          const modifiedText = shift.modifiedAfterClose ? `Igen, ${shift.lastModifiedAfterCloseByName || "-"}` : "Nem";

          tr.innerHTML = `
            <td>${dateText}</td>
            <td>${standOwner}</td>
            <td>${shift.closedByName || "-"}</td>
            <td>${formatMoney(shift.totalSalesValue)}</td>
            <td>${formatMoney(shift.totalCashExpected || shift.totalSalesValue)}</td>
            <td>${modifiedText}</td>
            <td>
              <a class="small-link-btn" href="stand.html?shiftId=${encodeURIComponent(shift.id)}">Megnyitás</a>
            </td>
          `;

          closedShiftsBody.appendChild(tr);
        });
      } catch (error) {
        console.error(error);
        closedShiftsMessage.textContent = "Nem sikerült betölteni a lezárt standokat.";
        closedShiftsBody.innerHTML = `<tr><td colspan="7">Hiba történt betöltés közben.</td></tr>`;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        userInfo.textContent = "Nincs jogosultság beállítva ehhez a felhasználóhoz.";
        menu.innerHTML = "";
        return;
      }

      const userData = userSnap.data();

      if (!userData.active) {
        userInfo.textContent = "Ez a felhasználó inaktív.";
        menu.innerHTML = "";
        return;
      }

      userInfo.textContent = `${userData.name} - ${userData.role === "admin" ? "Admin" : "Dolgozó"}`;

      addMenuItem("Standolás", "Aktuális stand vagy új stand nyitása", "stand.html");
      addMenuItem("Tartozások", "Nyitott tartozások, befizetések", "debts.html");
      addMenuItem("Terméklista", "Termékek, árak és készlet", "products.html");

      if (userData.role === "admin") {
        addMenuItem("Admin ellenőrzések", "Módosítások, eltérések, naplók", "admin.html");
        addMenuItem("Riportok", "Árrés, fogyás, dolgozói teljesítmény", "reports.html");
        addMenuItem("Felhasználók", "Jogosultságok kezelése", "users.html");
      }

      await loadClosedShifts();
    });
  </script>
</body>
</html>
